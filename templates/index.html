<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Malaria Detection AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* Upload Box */
.upload-box {
    border:2px dashed rgba(255,255,255,0.6);
    padding:25px;
    border-radius:15px;
    cursor:pointer;
    transition:0.3s;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:5px;
    min-height:130px;
}

.upload-box:hover {
    background: rgba(255,255,255,0.1);
}

input[type="file"] {
    display:none;
}

/* Preview */
#preview {
    margin-top:15px;
    display:none;
}

#preview img {
    width:200px;
    border-radius:10px;
}

/* Button */
button {
    margin-top:20px;
    background: linear-gradient(to right,#00c6ff,#0072ff);
    border:none;
    padding:12px 25px;
    border-radius:25px;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover {
    transform:scale(1.05);
}

/* Loader */
#loader {
    display:none;
    margin-top:20px;
}

.spinner {
    border:5px solid rgba(255,255,255,0.3);
    border-top:5px solid white;
    border-radius:50%;
    width:40px;
    height:40px;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin {
    0% {transform:rotate(0deg);}
    100% {transform:rotate(360deg);}
}
</style>

<script>
function previewImage(event) {
    const file = event.target.files[0];
    const preview = document.getElementById("preview");
    const img = document.getElementById("img-preview");

    if(file){
        img.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
}

function showLoader(){
    document.getElementById("loader").style.display = "block";
    document.getElementById("btn").innerText = "Processing...";
}

// Drag & Drop
function dropHandler(event){
    event.preventDefault();
    const fileInput = document.getElementById("file-upload");
    fileInput.files = event.dataTransfer.files;
    previewImage({target:fileInput});
}

function dragOverHandler(event){
    event.preventDefault();
}
</script>

</head>

<body>

<div class="card">

<h1>Malaria Detection AI</h1>

<form action="/predict" method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

    <!-- Upload Box -->
    <label class="upload-box"
           ondrop="dropHandler(event)"
           ondragover="dragOverHandler(event)">

        <div style="font-size:18px;">
            📁 Drag & Drop Image
        </div>

        <div style="font-size:14px; opacity:0.7;">
            or click to browse
        </div>

        <input id="file-upload" type="file" name="file" accept="image/*" onchange="previewImage(event)" required>

    </label>

    <!-- Preview -->
    <div id="preview">
        <img id="img-preview">
    </div>

    <!-- Button -->
    <button id="btn" type="submit">Predict</button>

</form>

<!-- Loader -->
<div id="loader">
    <div class="spinner"></div>
    <p>Analyzing Image...</p>
</div>

</div>

</body>
</html>
